<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hold My Hand — Library</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1f2530; --border: #2a313d;
    --text: #e6e9ef; --muted: #9aa4b2; --accent: #7aa2f7; --accent-2: #9ece6a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
  .eyebrow { color: var(--accent); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
  h1 { font-size: 28px; margin: 6px 0 6px; }
  .sub { color: var(--muted); margin: 0 0 24px; }
  .group { margin-bottom: 26px; }
  .group h2 { font-size: 16px; margin: 0 0 10px; color: var(--text); font-weight: 600; }
  .group h2 .count { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 6px; }
  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
          padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between;
          align-items: center; gap: 14px; }
  .item .meta { min-width: 0; }
  .item .title { font-weight: 600; }
  .item .facts { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .item .facts code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; }
  .open { background: var(--accent); color: #0b0d12; border: 0; border-radius: 9px;
          padding: 9px 16px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .open:hover { filter: brightness(1.08); }
  .empty { color: var(--muted); background: var(--panel); border: 1px dashed var(--border);
           border-radius: 12px; padding: 28px; text-align: center; }
  .empty code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; color: var(--text); }
  .status { color: var(--accent); min-height: 20px; margin-bottom: 10px; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Hold My Hand</div>
  <h1>Library</h1>
  <p class="sub" id="sub"></p>
  <div class="status" id="status"></div>
  <div id="list"></div>
</div>

<script>
  const payload = __LIBRARY_JSON__;   // { items: [...] }
  const meta = __HMH_META_JSON__;     // { token?, regenerateHint? }
  const items = payload.items || [];

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

  function apiFetch(url, options = {}) {
    const headers = { ...(options.headers || {}) };
    if (meta.token) headers['X-HMH-Token'] = meta.token;
    return fetch(url, { ...options, headers });
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const then = new Date(iso).getTime();
    if (!then) return '';
    const days = Math.floor((Date.now() - then) / 86400000);
    if (days <= 0) return 'today';
    if (days === 1) return 'yesterday';
    if (days < 30) return days + ' days ago';
    return new Date(iso).toLocaleDateString();
  }

  function render() {
    $('sub').textContent = items.length
      ? `${items.length} saved walkthrough${items.length > 1 ? 's' : ''}, newest first.`
      : '';
    if (!items.length) {
      $('list').innerHTML =
        '<div class="empty">No saved walkthroughs yet.<br><br>' +
        'Generate one with <code>/hold-my-hand:explain &lt;your question&gt;</code> in your Claude Code session.</div>';
      return;
    }
    // Group by question (re-asks collapse together); groups ordered by their
    // newest entry; entries within a group newest-first.
    const groups = new Map();
    for (const it of items) {
      const key = (it.question || it.title || it.id).trim();
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(it);
    }
    const ordered = [...groups.entries()].map(([q, list]) => {
      list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      return { q, list, newest: list[0].createdAt || '' };
    }).sort((a, b) => b.newest.localeCompare(a.newest));

    let html = '';
    for (const g of ordered) {
      html += '<div class="group">';
      html += `<h2>${esc(g.q)}${g.list.length > 1 ? `<span class="count">${g.list.length} versions</span>` : ''}</h2>`;
      for (const it of g.list) {
        const sha = it.builtAtSha ? ` · built against <code>${esc(String(it.builtAtSha).slice(0, 7))}</code>` : '';
        const when = it.createdAt ? ` · ${esc(timeAgo(it.createdAt))}` : '';
        const steps = it.stepCount != null ? `${it.stepCount} steps` : '';
        html += '<div class="item">';
        html += `<div class="meta"><div class="title">${esc(it.title || it.question || it.id)}</div>` +
                `<div class="facts">${steps}${when}${sha}</div></div>`;
        html += `<button class="open" data-id="${esc(it.id)}">Open</button>`;
        html += '</div>';
      }
      html += '</div>';
    }
    $('list').innerHTML = html;
    $('list').querySelectorAll('.open').forEach((b) => {
      b.onclick = async () => {
        b.disabled = true;
        $('status').textContent = 'Opening…';
        try {
          const res = await apiFetch('/api/open', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: b.dataset.id }),
          });
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          location.href = '/';
        } catch (err) {
          $('status').textContent = '❌ ' + err.message;
          b.disabled = false;
        }
      };
    });
  }

  render();
</script>
</body>
</html>
